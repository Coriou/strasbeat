<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>beaitbox</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header class="bar">
      <span class="brand">beaitbox</span>
      <div class="controls">
        <select id="pattern-picker" title="Load a pattern from /patterns"></select>
        <button id="play" title="Play (Ctrl/Cmd+Enter in editor)">▶ play</button>
        <button id="stop" title="Stop (Ctrl/Cmd+. in editor)">■ stop</button>
        <button id="save" title="Save current editor contents to /patterns">⤓ save</button>
        <button id="export-wav" title="Render the current pattern offline to a WAV file">⤓ wav</button>
      </div>
      <div class="midi-controls" title="MIDI keyboard input">
        <span class="sep">·</span>
        <select id="preset-picker" title="Sound used when you play MIDI keys"></select>
        <button id="capture" title="Toggle live capture — when on, played notes are recorded; click again to save as a pattern">● capture</button>
      </div>
      <span id="midi-status" class="status midi">midi: off</span>
      <span id="status" class="status">loading…</span>
    </header>
    <main>
      <div id="editor" class="editor"></div>
      <canvas id="roll" width="800" height="180"></canvas>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
